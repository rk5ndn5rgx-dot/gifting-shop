<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Shelf - Inventory & Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="giftshelf-container">
        <header>
            <h1>🎁 Gift Shelf</h1>
            <p>Your Inventory & A.I. Dollar Rewards</p>
        </header>
        <main>
            <div id="shelf-content">
                <div id="balance-display">
                    <p>Loading your balance...</p>
                </div>
                <div id="inventory">
                    <h2>Your Gifts</h2>
                    <div id="gift-list">
                        <p>Loading inventory...</p>
                    </div>
                </div>
            </div>
        </main>
        <footer>
            <p>&copy; 2026 RAY D. ENT. All rights reserved.</p>
        </footer>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
