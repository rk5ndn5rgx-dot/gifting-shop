<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
		<meta name="description" content="Send virtual gifts, video chat, and connect with friends in real-time. Get 100 free credits to start!" />
		<meta name="theme-color" content="#667eea" />
		<title>RAY D. ENT — Video Chatroom & Gift Shop</title>
		<link rel="stylesheet" href="/style.css">
		<link rel="stylesheet" href="/styles/global.css">
		<!-- Firebase SDK -->
		<script type="module">
			import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
			import { getDatabase } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
			
			const firebaseConfig = {
			  apiKey: "AIzaSyB0Y2l5fHvzoUkSJFWrd4ADb-6rRAT47Sw",
			  authDomain: "studio-2fb13.firebaseapp.com",
			  projectId: "studio-2fb13",
			  databaseURL: "https://studio-2fb13-default-rtdb.firebaseio.com",
			  storageBucket: "studio-2fb13.firebasestorage.app",
			  messagingSenderId: "367389228492",
			  appId: "1:367389228492:web:bc6f2aa62446f7dd957169",
			  measurementId: "G-GQVYKH4J36"
			};
			
			window.firebaseApp = initializeApp(firebaseConfig);
			window.firebaseDb = getDatabase(window.firebaseApp);
		</script>
	</head>
	<body>
			<!-- Welcome Banner -->
			<div id="welcomeBanner" class="welcome-banner">
				<div class="welcome-content">
					<h2>🎁 Welcome to RAY D. ENT Gift Shop!</h2>
					<p>Connect with friends, send virtual gifts, and video chat in real-time</p>
					<ul class="features-list">
						<li>🎥 HD Video Chat</li>
						<li>🎁 Send Virtual Gifts</li>
						<li>💬 Real-time Messaging</li>
						<li>🎉 100 Free Credits to Start!</li>
					</ul>
					<button id="getStartedBtn" class="get-started-btn">Get Started Free!</button>
				</div>
			</div>

			<header>
				<h1>RAY D. ENT — Chat & Studio</h1>
				<div class="header-controls">
					<label>Username: <input id="username" placeholder="Enter your name" class="small-input" /></label>
					<label>Quality: 
						<select id="videoQuality" class="small-input">
							<option value="low">Low</option>
							<option value="medium" selected>Med</option>
							<option value="high">High</option>
						</select>
					</label>
					<label>Room: <input id="roomId" value="main" class="small-input" /></label>
					<span id="balanceBadge" class="balance-badge" title="Your credits">Balance: —</span>
					<span id="userIdLabel" class="user-id-label" title="Persistent user id (for debugging)"></span>
					<span id="localName" class="hidden"></span>
					<button id="joinBtn">Join Room</button>
					<button id="openStudioBtn" class="small-input" onclick="location.href='/studio'">Studio</button>
					<button id="openStageBtn" class="small-input" onclick="location.href='/stage'">Stage</button>
				</div>
			</header>

			<main class="studio-root">
				<section class="studio-left">
					<!-- left column could host quick controls or enterprise panel -->
				</section>
				<section class="studio-center">
					<div class="camera-border" id="cameraBorder">
						<div class="camera-stage">
							<video id="localVideo" autoplay muted playsinline></video>
							<!-- remote videos will be appended to #remoteVideos container -->
							<div id="remoteVideos" aria-hidden="false"></div>
						</div>
					</div>
				</section>
				<section class="studio-right">
					<!-- overlays live here (chat, gifting, alerts) -->
					<div id="chat" class="overlay chat-panel">
						<div id="messages"></div>
						<div class="chat-input-row">
							<input id="chatInput" placeholder="Type a message" />
							<button id="sendBtn">Send</button>
							<button id="giftsBtn">Gifts 🎁</button>
							<button id="buyCreditsBtn" title="Buy more credits">Buy Credits</button>
						</div>
					</div>
				</section>
			</main>

		<!-- Gift picker modal (hidden by default) -->
		<div id="giftModal" class="gift-modal">
			<div class="gift-panel">
				<h3>Send a Gift</h3>
				<div id="giftList"></div>
				<div id="userList"></div>
				<div class="gift-close-row"><button id="closeGift">Close</button></div>
			</div>
		</div>

		<script src="/socket.io/socket.io.js"></script>
		<script type="module" src="/src/main.js"></script>
		<script src="/script.js" defer></script>
	</body>
</html>
